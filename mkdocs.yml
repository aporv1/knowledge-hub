# publishing/outputs/site/mkdocs.yml
site_name: Knowledge Hub
site_url: https://aporv1.github.io/knowledge-hub/
site_description: A working notebook for the AI and security curious
site_author: Aporv
repo_url: https://github.com/aporv1/knowledge-hub
repo_name: aporv1/knowledge-hub
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    scheme: slate
    primary: black
    accent: red
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - awesome-pages
  - tags
  - blog:
      blog_dir: ai/blog
      blog_toc: true
      post_date_format: medium
      post_url_format: "{date}/{slug}"
      authors_file: "{blog}/.authors.yml"
  - blog:
      blog_dir: cybersec/blog
      blog_toc: true
      post_date_format: medium
      post_url_format: "{date}/{slug}"
      authors_file: "{blog}/.authors.yml"
  - rss:
      match_path: "(ai|cybersec)/blog/posts/.*"
      date_from_meta:
        as_creation: date.created
        as_update: date.updated

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aporv1
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/ApurvC1

copyright: Copyright &copy; 2026 Aporv
